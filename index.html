<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="xingzihai - 星光落入冰水，温暖慢慢渗透">
  <title>xingzihai · 冰水泡枸杞</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  
  <style>
    .surface-world { position: relative; z-index: 10; }
    
    .water-control {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
      padding: 14px 18px;
      border-radius: 12px;
      z-index: 100;
      font-family: 'Inter', sans-serif;
      color: rgba(255, 255, 255, 0.85);
      font-size: 12px;
    }
    
    .water-control:hover { background: rgba(255, 255, 255, 0.18); }
    .water-control h4 { margin: 0 0 10px 0; font-size: 13px; font-weight: 500; }
    .water-control label { display: flex; align-items: center; gap: 10px; margin: 7px 0; }
    
    .water-control input[type="range"] {
      width: 100px;
      height: 3px;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    
    .water-control input[type="range"]::-webkit-slider-thumb {
      width: 12px;
      height: 12px;
      background: rgba(255, 255, 255, 0.75);
      border-radius: 50%;
      cursor: pointer;
    }
    
    .water-control .value-display { font-size: 10px; opacity: 0.7; min-width: 28px; }
    
    .water-control .toggle-btn {
      background: rgba(255, 255, 255, 0.15);
      border: none;
      padding: 5px 12px;
      border-radius: 6px;
      color: inherit;
      font-size: 11px;
      cursor: pointer;
      margin-top: 10px;
    }
    
    .water-control .toggle-btn:hover { background: rgba(255, 255, 255, 0.28); }
    
    .water-resources { display: none; }
  </style>
</head>
<body>
  <!-- 水效果资源图片 -->
  <div class="water-resources">
    <img id="xneg" src="water-assets/xneg.jpg">
    <img id="xpos" src="water-assets/xpos.jpg">
    <img id="ypos" src="water-assets/ypos.jpg">
    <img id="zneg" src="water-assets/zneg.jpg">
    <img id="zpos" src="water-assets/zpos.jpg">
    <img id="tiles" src="water-assets/tiles.jpg">
  </div>
  
  <!-- 控制面板 -->
  <div class="water-control">
    <h4>🌊 水效果设置</h4>
    <label>
      <span>水层深度</span>
      <input type="range" id="water-depth" min="-1" max="2" step="0.1" value="0.5">
      <span class="value-display" id="depth-value">0.5</span>
    </label>
    <label>
      <span>涟漪强度</span>
      <input type="range" id="ripple-strength" min="0.005" max="0.05" step="0.005" value="0.01">
      <span class="value-display" id="ripple-value">0.01</span>
    </label>
    <label>
      <span>透明度</span>
      <input type="range" id="water-opacity" min="0.1" max="1" step="0.1" value="0.75">
      <span class="value-display" id="opacity-value">75%</span>
    </label>
    <button class="toggle-btn" id="toggle-water">关闭水效果</button>
  </div>
  
  <!-- 原网页内容 -->
  <div class="surface-world">
    <nav class="site-nav">
      <div class="nav-container">
        <a href="#hero" class="nav-logo">xingzihai</a>
        <div class="nav-links">
          <a href="#gallery" class="nav-link">作品</a>
          <a href="#philosophy" class="nav-link">理念</a>
          <a href="#skills" class="nav-link">技术</a>
          <a href="#contact" class="nav-link">联系</a>
        </div>
        <button class="nav-toggle" aria-label="菜单"><span></span><span></span><span></span></button>
      </div>
    </nav>
    
    <section id="hero" class="hero">
      <div class="hero-light-flow"></div>
      <div class="hero-particles">
        <span class="particle p1"></span><span class="particle p2"></span><span class="particle p3"></span><span class="particle p4"></span><span class="particle p5"></span>
      </div>
      <div class="firefly-container"></div>
      <div class="hero-content">
        <div class="avatar-container">
          <div class="avatar-aura"></div>
          <div class="avatar-transition"></div>
          <div class="avatar-crystal-wrapper">
            <div class="avatar-crystal">
              <span class="crystal-face f1"></span><span class="crystal-face f2"></span><span class="crystal-face f3"></span><span class="crystal-face f4"></span><span class="crystal-face f5"></span><span class="crystal-face f6"></span>
              <span class="crystal-top"></span><span class="crystal-bottom"></span>
            </div>
            <div class="avatar-core"><span class="core-inner"></span></div>
          </div>
          <div class="avatar-glow"></div>
        </div>
        <div class="hero-identity">
          <h1 class="hero-name">xingzihai</h1>
          <p class="hero-name-cn">冰水泡枸杞</p>
          <p class="hero-tagline">星光落入冰水，温暖慢慢渗透</p>
        </div>
      </div>
      <div class="scroll-hint"><div class="scroll-arrow"></div></div>
    </section>
  </div>
  
  <!-- WebGL Water 完整脚本 -->
  <script src="water-assets/OES_texture_float_linear-polyfill.js"></script>
  <script src="water-assets/lightgl.js"></script>
  <script src="water-assets/cubemap.js"></script>
  <script src="water-assets/renderer.js"></script>
  <script src="water-assets/water.js"></script>
  <script src="water-assets/main.js"></script>
  
  <script src="scripts/main.js"></script>
</body>
</html>
